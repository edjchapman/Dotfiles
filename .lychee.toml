# Lychee link-checker config.
# See https://lychee.cli.rs/ for the full options list.

# Networking
max_redirects = 5
max_retries = 3
retry_wait_time = 2
timeout = 10
max_concurrency = 8

# Accept these HTTP statuses as success.
# 429 (Too Many Requests) often happens against GitHub/Twitter; treat as valid.
accept = ["200..=204", "206", "301", "302", "304", "307", "308", "429"]

# Skip schemes that lychee shouldn't validate.
exclude = [
    "^mailto:",
    "^tel:",
    "^chrome://",
    "^file://",
    # Anchored-only fragments handled by htmlproofer.
    "^#",
    # Self-referencing canonical/asset URLs. Mkdocs generates these into
    # <link rel="canonical">, sitemap, RSS, and timeago JS asset paths
    # based on site_url. Internal-link validity is already covered by
    # htmlproofer against the built site/ tree, so we don't need lychee
    # to GET them — and on PRs where new pages haven't deployed yet,
    # they 404 against production.
    "^https://edjchapman\\.github\\.io/dotfiles/",
    "^https://edjchapman\\.github\\.io/",
    # Material's content.action.edit / content.action.view features render
    # blob/edit/raw URLs against main for every page. New pages added in
    # a PR 404 against main until merge. The PR diff itself proves the
    # files exist; lychee re-checking is redundant.
    "^https://github\\.com/edjchapman/dotfiles/(blob|edit|raw)/main/",
]

# Skip these paths entirely.
exclude_path = [
    "site/assets/images/social/",  # auto-generated social cards
    "site/sitemap.xml",            # validated by sitemap-completeness job
    "node_modules/",
]

# Hosts we'll skip even when referenced (flaky or auth-gated).
exclude_loopback = true

# Be honest about who we are; some hosts 403 the default UA.
user_agent = "lychee/dotfiles-docs (+https://edjchapman.github.io/dotfiles/)"

# Cache successful results for the duration of one CI day.
cache = true
max_cache_age = "1d"

# Treat any non-success as a failure to break CI.
require_https = false
