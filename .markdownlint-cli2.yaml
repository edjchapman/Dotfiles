---
config:
    default: true
    # Allow long lines — tables and command examples often exceed 80 cols.
    MD013: false
    # Allow inline HTML (badges, details/summary blocks).
    MD033: false
    # Allow duplicate headings across sections (common in runbooks).
    MD024:
        siblings_only: true
    # Permit bare URLs in code/text where useful.
    MD034: false
    # First line need not be a heading (frontmatter or badge often comes first).
    MD041: false
    # Table column style varies by editor; we don't enforce it.
    MD060: false
    # MD025 by default treats YAML frontmatter `title:` as an H1 and clashes
    # with the body's `# Heading`. We use both — disable the frontmatter check.
    MD025:
        front_matter_title: ""
    # MD046 enforces a single code-block style (fenced vs indented). Disable —
    # mkdocs-material content tabs and `??? abstract` collapsibles indent prose
    # lists 4 spaces, which the linter sees as "indented code" even when it's not.
    MD046: false

ignores:
    - .git
    - node_modules
    - .claude
