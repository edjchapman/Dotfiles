<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" role="img" aria-label="architecture: source repo → chezmoi apply → $HOME">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#58a6ff"/>
    </marker>
  </defs>

  <rect width="800" height="220" fill="#0d1117"/>

  <g transform="translate(40, 70)">
    <rect width="200" height="80" rx="12" fill="#21262d" stroke="url(#accent)" stroke-width="2"/>
    <text x="100" y="32" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f0f6fc" text-anchor="middle">source repo</text>
    <text x="100" y="56" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#8b949e" text-anchor="middle">~/.local/share/chezmoi</text>
  </g>

  <line x1="244" y1="110" x2="298" y2="110" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(304, 70)">
    <rect width="192" height="80" rx="12" fill="#21262d" stroke="url(#accent)" stroke-width="2"/>
    <text x="96" y="32" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f0f6fc" text-anchor="middle">chezmoi apply</text>
    <text x="96" y="56" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#8b949e" text-anchor="middle">render · decrypt · run</text>
  </g>

  <line x1="500" y1="110" x2="554" y2="110" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(560, 70)">
    <rect width="200" height="80" rx="12" fill="#21262d" stroke="url(#accent)" stroke-width="2"/>
    <text x="100" y="32" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f0f6fc" text-anchor="middle">$HOME</text>
    <text x="100" y="56" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#8b949e" text-anchor="middle">configured Mac</text>
  </g>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">
    <text x="140" y="180">dot_*, encrypted_*, run_*</text>
    <text x="400" y="180">machine_type × arch templating</text>
    <text x="660" y="180">idempotent, drift-checked</text>
  </g>
</svg>
