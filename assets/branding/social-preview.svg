    <text x="372" y="460" fill="#8b949e">·</text>
    <text x="392" y="460" fill="#c9d1d9">age-encrypted secrets</text>
    <text x="652" y="460" fill="#8b949e">·</text>
    <text x="672" y="460" fill="#c9d1d9">drift detection</text>

    <text x="96" y="496" fill="#c9d1d9">weekly self-update PRs</text>
    <text x="356" y="496" fill="#8b949e">·</text>
    <text x="376" y="496" fill="#c9d1d9">first-class Claude Code integration</text>
  </g>

  <text x="96" y="588" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" font-weight="500" fill="#58a6ff">github.com/edjchapman/dotfiles</text>
  <text x="1184" y="588" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6e7681" text-anchor="end">managed with chezmoi</text>
