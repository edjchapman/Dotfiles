  <text x="208" y="198" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="400" fill="#8b949e">Bare metal to fully configured Mac in one command.</text>

  <g font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="13" font-weight="500">
