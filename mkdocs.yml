---
site_name: dotfiles
site_description: >-
    Reproducible, privacy-hardened macOS configuration managed with chezmoi.
    Matrix-tested templates, age-encrypted secrets, drift detection, weekly
    self-update PRs, first-class Claude Code integration.
site_url: https://edjchapman.github.io/dotfiles/
site_author: Ed Chapman

repo_name: edjchapman/dotfiles
repo_url: https://github.com/edjchapman/dotfiles
edit_uri: edit/main/docs/

# Non-strict so the build never fails on cross-PR missing-file refs.
strict: false

theme:
    name: material
    palette:
        - media: "(prefers-color-scheme: light)"
          scheme: default
          primary: indigo
          accent: deep purple
          toggle:
              icon: material/brightness-7
              name: Switch to dark mode
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          primary: indigo
          accent: deep purple
          toggle:
              icon: material/brightness-4
              name: Switch to light mode
    features:
        - navigation.instant
        - navigation.tracking
        - navigation.tabs
        - navigation.sections
        - navigation.top
        - search.suggest
        - search.highlight
        - content.code.copy
        - content.action.edit
    font:
        text: Inter
        code: JetBrains Mono
    icon:
        repo: fontawesome/brands/github

plugins:
    - search

markdown_extensions:
    - admonition
    - attr_list
    - def_list
    - footnotes
    - md_in_html
    - tables
    - toc:
          permalink: true
    - pymdownx.details
    - pymdownx.highlight:
          anchor_linenums: true
          line_spans: __span
          pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - pymdownx.tabbed:
          alternate_style: true

nav:
    - Home: index.md
    - Quick start: runbooks/new-machine.md
    - Runbooks:
          - runbooks/index.md
          - New machine bootstrap: runbooks/new-machine.md
          - Secret rotation: runbooks/secret-rotation.md
          - Recover from drift: runbooks/recover-from-drift.md
          - Brew sync: runbooks/brew-sync.md
          - Branch protection: runbooks/branch-protection.md
    - Decisions:
          - decisions/index.md
          - 0001 — chezmoi as source of truth: decisions/0001-chezmoi-as-source-of-truth.md
          - 0002 — age encryption: decisions/0002-age-encryption.md
          - 0003 — machine-type templating: decisions/0003-machine-type-templating.md
          - 0004 — rebrand for public showcase: decisions/0004-rebrand-public-showcase.md
    - FAQ: faq.md
    - Comparison: comparison.md

extra:
    social:
        - icon: fontawesome/brands/github
          link: https://github.com/edjchapman
