---
# Production deploy of the docs site to Cloudflare Pages.
# Custom domain attached in CF dashboard: https://dotfiles.edchapman.co.uk
# Per-PR previews handled separately by preview.yml.
# See docs/runbooks/cloudflare-deploys.md and docs/runbooks/custom-domain.md.

name: Pages

on:
    push:
        branches: [main]
        paths:
            - docs/**
            - mkdocs.yml
            - CHANGELOG.md
            - CONTRIBUTING.md
            - SECURITY.md
            - CODE_OF_CONDUCT.md
            - .github/workflows/pages.yml
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: pages-prod
    cancel-in-progress: false

jobs:
    deploy:
        name: Build + deploy to Cloudflare Pages production
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0  # full history → git-revision-date-localized plugin needs it

            - name: Install Cairo + Pango (for social card imaging, cached)
              uses: awalsh128/cache-apt-pkgs-action@v1
              with:
                  packages: libcairo2-dev libpango1.0-dev libgdk-pixbuf2.0-dev libffi-dev
                  version: 1.0

            - uses: actions/setup-python@v6
              with:
                  python-version: '3.12'
                  cache: pip
                  cache-dependency-path: docs/requirements.txt

            - name: Install mkdocs-material
              run: |
                  python -m pip install --upgrade pip setuptools wheel
                  pip install -r docs/requirements.txt

            - name: Cache social cards
              uses: actions/cache@v6
              with:
                  path: .cache
                  key: mkdocs-social-${{ github.sha }}
                  restore-keys: |
                      mkdocs-social-

            - name: Build site (strict)
              run: mkdocs build --strict

            - name: Deploy to Cloudflare Pages production (branch=main)
              id: deploy
              uses: cloudflare/wrangler-action@v4
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: pages deploy site --project-name=dotfiles --branch=main

            - name: Report deploy URL
              run: |
                  echo "::notice::Production deployment: ${{ steps.deploy.outputs.deployment-url }}"
                  echo "::notice::Custom domain: https://dotfiles.edchapman.co.uk/"
