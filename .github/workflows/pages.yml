---
name: Pages

on:
    push:
        branches: [main]
        paths:
            - docs/**
            - mkdocs.yml
            - CHANGELOG.md
            - CONTRIBUTING.md
            - SECURITY.md
            - CODE_OF_CONDUCT.md
            - .github/workflows/pages.yml
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        name: Build mkdocs-material site
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0  # full history → git-revision-date-localized plugin needs it

            - name: Install Cairo + Pango (for social card imaging)
              # Retry on apt mirror flakes.
              uses: nick-fields/retry@v3
              with:
                  timeout_minutes: 5
                  max_attempts: 3
                  retry_wait_seconds: 10
                  command: |
                      sudo apt-get update
                      sudo apt-get install -y \
                          libcairo2-dev \
                          libpango1.0-dev \
                          libgdk-pixbuf2.0-dev \
                          libffi-dev

            - uses: actions/setup-python@v6
              with:
                  python-version: '3.12'
                  cache: pip
                  cache-dependency-path: docs/requirements.txt

            - name: Install mkdocs-material
              run: |
                  python -m pip install --upgrade pip setuptools wheel
                  pip install -r docs/requirements.txt

            - name: Cache social cards
              uses: actions/cache@v4
              with:
                  path: .cache
                  key: mkdocs-social-${{ github.sha }}
                  restore-keys: |
                      mkdocs-social-

            - name: Build site (strict)
              run: mkdocs build --strict

            - uses: actions/configure-pages@v6

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: site

    deploy:
        name: Deploy to GitHub Pages
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
