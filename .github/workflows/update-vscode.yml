---
name: Weekly VS Code extension health check

on:
    schedule:
        - cron: '30 9 * * 1'  # Mondays 09:30 UTC
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    marketplace-check:
        name: Marketplace availability check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install chezmoi
              run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

            - name: Render Brewfile and query marketplace for each vscode entry
              id: check
              run: |
                  rendered=$(mktemp)
                  chezmoi execute-template \
                      --init --source="$(pwd)" \
                      --override-data '{"machine_type":"personal","gpg_signing_key":""}' \
                      < Brewfile.tmpl > "$rendered"

                  broken=""
                  deprecated=""
                  total=0

                  while read -r ext; do
                      [ -z "$ext" ] && continue
                      total=$((total + 1))
                      response=$(curl -s --max-time 15 \
                          -X POST \
                          -H "Content-Type: application/json" \
                          -H "Accept: application/json;api-version=3.0-preview.1" \
                          -d "{\"filters\":[{\"criteria\":[{\"filterType\":7,\"value\":\"$ext\"}]}],\"flags\":914}" \
                          https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery \
                          || echo '{}')
                      count=$(printf '%s' "$response" | jq '.results[0].extensions | length // 0' 2>/dev/null || echo 0)
                      if [ "$count" = "0" ]; then
                          broken="${broken}- ${ext}\n"
                          continue
                      fi
                      # Check for explicit deprecation flag.
                      is_deprecated=$(printf '%s' "$response" | jq -r '.results[0].extensions[0].flags // ""' 2>/dev/null)
                      case "$is_deprecated" in
                          *deprecated*) deprecated="${deprecated}- ${ext}\n" ;;
                      esac
                  done < <(awk -F'"' '/^[[:space:]]*vscode[[:space:]]+"/{print $2}' "$rendered")

                  echo "total=$total" >> "$GITHUB_OUTPUT"
                  {
                      echo "broken<<EOF"
                      printf '%b' "$broken"
                      echo "EOF"
                      echo "deprecated<<EOF"
                      printf '%b' "$deprecated"
                      echo "EOF"
                  } >> "$GITHUB_OUTPUT"

                  if [ -z "$broken" ] && [ -z "$deprecated" ]; then
                      echo "needs_report=false" >> "$GITHUB_OUTPUT"
                  else
                      echo "needs_report=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Write health report
              if: steps.check.outputs.needs_report == 'true'
              run: |
                  {
                      echo "# VS Code extension health report"
                      echo ""
                      echo "Generated by \`.github/workflows/update-vscode.yml\` on $(date -u +'%Y-%m-%d')."
                      echo ""
                      echo "Checked ${{ steps.check.outputs.total }} extension(s) declared in \`Brewfile.tmpl\`."
                      echo ""
                      if [ -n "${{ steps.check.outputs.broken }}" ]; then
                          echo "## Not found on marketplace"
                          echo ""
                          echo "These extensions returned no result from the Marketplace API. They may have been renamed, removed, or made private. Investigate each and update \`Brewfile.tmpl\`."
                          echo ""
                          printf '%b' "${{ steps.check.outputs.broken }}"
                          echo ""
                      fi
                      if [ -n "${{ steps.check.outputs.deprecated }}" ]; then
                          echo "## Flagged as deprecated"
                          echo ""
                          echo "Marketplace metadata flags these as deprecated. Consider replacements."
                          echo ""
                          printf '%b' "${{ steps.check.outputs.deprecated }}"
                          echo ""
                      fi
                  } > .github/vscode-health-report.md

            - name: Create draft PR
              if: steps.check.outputs.needs_report == 'true'
              uses: peter-evans/create-pull-request@v8
              with:
                  token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
                  branch: chore/weekly-vscode-health
                  delete-branch: true
                  draft: true
                  commit-message: "chore: weekly VS Code extension health report"
                  title: "chore: VS Code extensions need attention"
                  body: |
                      Weekly health check found VS Code extensions that may need attention in `Brewfile.tmpl`.

                      ### Not found on marketplace
                      ${{ steps.check.outputs.broken }}

                      ### Flagged as deprecated
                      ${{ steps.check.outputs.deprecated }}

                      No automatic bumps — review and adjust `Brewfile.tmpl` manually.
                  add-paths: |
                      .github/vscode-health-report.md
