---
name: Weekly Mac App Store availability check

on:
    schedule:
        - cron: '45 9 * * 1'  # Mondays 09:45 UTC
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    appstore-check:
        name: App Store availability check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install chezmoi
              run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

            - name: Look up each mas entry against the iTunes API
              id: check
              run: |
                  rendered=$(mktemp)
                  chezmoi execute-template \
                      --init --source="$(pwd)" \
                      --override-data '{"machine_type":"personal","gpg_signing_key":""}' \
                      < Brewfile.tmpl > "$rendered"

                  broken=""
                  total=0

                  # Each mas line: `mas "Name", id: 12345`
                  while IFS=$'\t' read -r name id; do
                      [ -z "$id" ] && continue
                      total=$((total + 1))
                      response=$(curl -s --max-time 15 \
                          "https://itunes.apple.com/lookup?id=${id}" || echo '{"resultCount":0}')
                      count=$(printf '%s' "$response" | jq '.resultCount // 0' 2>/dev/null || echo 0)
                      if [ "$count" = "0" ]; then
                          broken="${broken}- ${name} (id: ${id})\n"
                      fi
                  done < <(awk -F'"' '/^[[:space:]]*mas[[:space:]]+"/{name=$2; match($0,/id:[[:space:]]*[0-9]+/); id=substr($0,RSTART+3,RLENGTH-3); gsub(/[[:space:]]/,"",id); print name"\t"id}' "$rendered")

                  echo "total=$total" >> "$GITHUB_OUTPUT"
                  {
                      echo "broken<<EOF"
                      printf '%b' "$broken"
                      echo "EOF"
                  } >> "$GITHUB_OUTPUT"

                  if [ -z "$broken" ]; then
                      echo "needs_report=false" >> "$GITHUB_OUTPUT"
                  else
                      echo "needs_report=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Write availability report
              if: steps.check.outputs.needs_report == 'true'
              run: |
                  {
                      echo "# Mac App Store availability report"
                      echo ""
                      echo "Generated by \`.github/workflows/update-mas.yml\` on $(date -u +'%Y-%m-%d')."
                      echo ""
                      echo "Checked ${{ steps.check.outputs.total }} \`mas\` entry/entries in \`Brewfile.tmpl\`."
                      echo ""
                      echo "## Not found in App Store"
                      echo ""
                      echo "These IDs returned no result from the iTunes lookup API. The app may have been pulled, region-restricted, or had its ID re-issued."
                      echo ""
                      printf '%b' "${{ steps.check.outputs.broken }}"
                  } > .github/mas-availability-report.md

            - name: Create draft PR
              if: steps.check.outputs.needs_report == 'true'
              uses: peter-evans/create-pull-request@v8
              with:
                  token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
                  branch: chore/weekly-mas-availability
                  delete-branch: true
                  draft: true
                  commit-message: "chore: weekly mas availability report"
                  title: "chore: Mac App Store apps need attention"
                  body: |
                      Weekly availability check found `mas` entries in `Brewfile.tmpl` that no longer resolve via the App Store lookup API.

                      ${{ steps.check.outputs.broken }}

                      Either the app was pulled, the ID changed, or it's no longer available in your store region. Investigate and either remove or update the entry in `Brewfile.tmpl`.
                  add-paths: |
                      .github/mas-availability-report.md
