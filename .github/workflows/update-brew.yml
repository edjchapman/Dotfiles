---
name: Weekly brew update

on:
    schedule:
        - cron: '0 9 * * 1'  # Mondays 09:00 UTC
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    check-outdated:
        name: brew outdated → draft PR
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install chezmoi
              run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

            - name: Render Brewfile for each machine_type and detect outdated
              id: outdated
              run: |
                  brew update >/dev/null
                  combined=""
                  for mt in personal work; do
                      chezmoi execute-template \
                          --init --source="$(pwd)" \
                          --override-data "{\"machine_type\":\"$mt\",\"gpg_signing_key\":\"\"}" \
                          < Brewfile.tmpl > "/tmp/Brewfile.$mt"
                      echo "::group::Rendered Brewfile ($mt)"
                      cat "/tmp/Brewfile.$mt"
                      echo "::endgroup::"
                      outdated=$(brew bundle list --file="/tmp/Brewfile.$mt" --formula 2>/dev/null \
                          | xargs -I{} brew info --json=v2 {} 2>/dev/null \
                          | jq -r '.formulae[]? | select(.versions.stable != .installed[0].version) | "\(.name): \(.installed[0].version // "n/a") → \(.versions.stable)"' \
                          || true)
                      if [ -n "$outdated" ]; then
                          combined="${combined}\n### machine_type=$mt\n\n\`\`\`\n${outdated}\n\`\`\`\n"
                      fi
                  done
                  if [ -z "$combined" ]; then
                      echo "no_updates=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "no_updates=false" >> "$GITHUB_OUTPUT"
                      {
                          echo "outdated<<EOF"
                          printf '%b' "$combined"
                          echo "EOF"
                      } >> "$GITHUB_OUTPUT"
                  fi

            - name: Write update report
              if: steps.outdated.outputs.no_updates == 'false'
              run: |
                  {
                      echo "# Brew outdated report"
                      echo ""
                      echo "Generated by \`.github/workflows/update-brew.yml\` on $(date -u +'%Y-%m-%d')."
                      echo ""
                      echo "## Outdated formulae (across machine_type variants)"
                      echo ""
                      printf '%b' "${{ steps.outdated.outputs.outdated }}"
                      echo ""
                      echo "Most formulae in the Brewfile are unpinned (latest stable), so a normal \`brew bundle install\` picks new versions automatically — this PR exists as a heads-up, not a required bump. Bump pins explicitly only when stability matters."
                  } > .github/brew-outdated-report.md

            - name: Create draft PR
              if: steps.outdated.outputs.no_updates == 'false'
              uses: peter-evans/create-pull-request@v8
              with:
                  branch: chore/weekly-brew-update
                  delete-branch: true
                  draft: true
                  commit-message: "chore: weekly brew outdated report"
                  title: "chore: weekly brew outdated report"
                  body: |
                      Automated weekly report of outdated Homebrew formulae against the rendered `Brewfile.tmpl`.

                      ${{ steps.outdated.outputs.outdated }}

                      No automatic bumps — review and adjust `Brewfile.tmpl` manually if needed.
                  add-paths: |
                      .github/brew-outdated-report.md
