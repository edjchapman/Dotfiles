---
name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

# Cancel superseded runs when a branch is force-pushed or another commit lands.
concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: ShellCheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
              env:
                  SHELLCHECK_OPTS: -s bash -e SC1071,SC2086
              with:
                  scandir: '.'
                  additional_files: 'executable_*'
                  ignore_paths: .git

    fmt:
        name: shfmt
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: mfinelli/setup-shfmt@a25fda4c1fe115aec0f85e04126610841bc3141d  # v4
              with:
                  shfmt-version: 3.10.0
            - run: make fmt-check

    yaml:
        name: yamllint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c  # v3
              with:
                  config_file: .yamllint.yaml

    markdown:
        name: markdownlint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v23
              with:
                  globs: '**/*.md'

    secrets:
        name: gitleaks
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0
            - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Runs the repo-specific hooks (chezmoi render, docs gates, ggshield, codespell,
    # file hygiene). The five linters that have dedicated parallel jobs above
    # (shellcheck/shfmt/yamllint/markdownlint/gitleaks) are SKIP-ped here so each runs
    # once, not twice. Job name kept as-is: it is a required status check in branch
    # protection (see docs/runbooks/branch-protection.md) — do not rename without also
    # updating the protection rule.
    pre-commit:
        name: pre-commit (all hooks)
        runs-on: ubuntu-latest
        env:
            SKIP: shellcheck-via-make,shfmt,yamllint,markdownlint-cli2,gitleaks
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-python@v6
              with:
                  python-version: '3.13'
            - name: Install chezmoi
              run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
            - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1

    bats:
        name: bats unit tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - name: Install bats-core
              run: sudo apt-get update && sudo apt-get install -y bats
            - name: Run bats
              run: make test-bats

    validate-templates:
        name: chezmoi templates (${{ matrix.machine_type }} / ${{ matrix.arch }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                machine_type: [personal, work]
                arch: [arm64, amd64]
        steps:
            - uses: actions/checkout@v7
            - name: Install chezmoi
              run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
            - name: Render every .tmpl
              run: |
                  failed=0
                  for tmpl in $(find . -name '*.tmpl' -not -path './.git/*' -not -name '.chezmoi.toml.tmpl'); do
                      echo "Rendering $tmpl (machine=${{ matrix.machine_type }} arch=${{ matrix.arch }})"
                      chezmoi execute-template \
                          --init --source="$(pwd)" \
                          --override-data '{"machine_type":"${{ matrix.machine_type }}","gpg_signing_key":"test","chezmoi":{"arch":"${{ matrix.arch }}"}}' \
                          < "$tmpl" > /dev/null || failed=1
                  done
                  exit $failed

    validate-plists:
        name: plist XML validation
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - name: Install chezmoi and xmllint
              run: |
                  sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
                  sudo apt-get update && sudo apt-get install -y libxml2-utils
            - name: Render and validate plist templates
              run: |
                  failed=0
                  while IFS= read -r tmpl; do
                      echo "::group::Validating $tmpl"
                      rendered=$(chezmoi execute-template \
                          --init --source="$(pwd)" \
                          --override-data '{"machine_type":"personal","gpg_signing_key":"test","chezmoi":{"arch":"arm64"}}' \
                          < "$tmpl")
                      if ! printf '%s' "$rendered" | xmllint --noout -; then
                          echo "::error file=$tmpl::Malformed plist after rendering"
                          failed=1
                      fi
                      echo "::endgroup::"
                  done < <(find . -name '*.plist.tmpl' -not -path './.git/*')
                  exit $failed

    brew-bundle-check:
        name: brew bundle check (macOS)
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v7
            - name: Install chezmoi
              run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
            - name: Render Brewfile and check
              run: |
                  chezmoi execute-template \
                      --init --source="$(pwd)" \
                      --override-data '{"machine_type":"personal","gpg_signing_key":""}' \
                      < Brewfile.tmpl > /tmp/Brewfile.rendered
                  echo "::group::Rendered Brewfile (first 40 lines)"
                  head -n 40 /tmp/Brewfile.rendered
                  echo "::endgroup::"
                  # `brew bundle check` exits 1 if anything is missing, which is expected
                  # on a fresh runner — we only want to fail on syntax errors and bad refs.
                  brew bundle list --file=/tmp/Brewfile.rendered > /dev/null
